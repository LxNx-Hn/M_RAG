services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mrag
      POSTGRES_PASSWORD: mrag
      POSTGRES_DB: mrag
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mrag"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://mrag:mrag@db:5432/mrag
      - TOKENIZERS_PARALLELISM=false
      - LOAD_GPU_MODELS=${LOAD_GPU_MODELS:-false}
    volumes:
      - ./backend/data:/app/data
      - ./backend/chroma_db:/app/chroma_db
      - hf_cache:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  hf_cache:
